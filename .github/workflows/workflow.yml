name: Build macOS app and publish release

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-latest

        env:
            PROJECT: BatFi.xcodeproj
            SCHEME: Installer
            CONFIGURATION: Release
            DESTINATION: "platform=macOS,arch=arm64"

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Show Xcode version
              run: xcodebuild -version

            - name: Resolve Swift packages
              shell: bash
              run: |
                  set -euo pipefail
                  xcodebuild -resolvePackageDependencies \
                    -project "$PROJECT" \
                    -scheme "$SCHEME" \
                    -destination "$DESTINATION"

            - name: Archive (unsigned)
              shell: bash
              run: |
                  set -euo pipefail
                  ARCHIVE_PATH="$PWD/build/${SCHEME}.xcarchive"
                  mkdir -p "$PWD/build"

                  xcodebuild archive \
                    -project "$PROJECT" \
                    -scheme "$SCHEME" \
                    -configuration "$CONFIGURATION" \
                    -destination "$DESTINATION" \
                    -archivePath "$ARCHIVE_PATH" \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    | tee xcodebuild.log

                  exit ${PIPESTATUS[0]}

            - name: Package app from archive
              id: package
              shell: bash
              run: |
                  set -euo pipefail
                  ARCHIVE_PATH="$PWD/build/${SCHEME}.xcarchive"
                  APP_PATH="$ARCHIVE_PATH/Products/Applications"

                  APP="$(find "$APP_PATH" -maxdepth 1 -name "*.app" -print -quit)"
                  if [[ -z "${APP:-}" ]]; then
                    echo "No .app found in archive at: $APP_PATH" >&2
                    ls -la "$APP_PATH" || true
                    exit 1
                  fi

                  APP_NAME="$(basename "$APP" .app)"
                  ZIP_NAME="${APP_NAME}-macOS.zip"

                  ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP_NAME"
                  echo "zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"
                  echo "Created $ZIP_NAME"

            - name: Upload build artifact (Actions)
              uses: actions/upload-artifact@v4
              with:
                  name: macos-app
                  path: ${{ steps.package.outputs.zip }}

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ steps.package.outputs.zip }}
                  generate_release_notes: true
